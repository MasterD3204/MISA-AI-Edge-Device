<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Google Search</title>
  </head>
  <body>
    <script>
      const SERPAPI_KEY = "a932ba13ac049c5536132aa9827cb2dda660691112a05b047c940a3c322d9c13";

      async function serpSearch(query, lang) {
        console.log(`[google-search] 🔍 Query: "${query}" | lang=${lang}`);
        const params = new URLSearchParams({
          q: query,
          api_key: SERPAPI_KEY,
          engine: "google",
          hl: lang,
          gl: lang === "vi" ? "vn" : "us",
          num: "5",
          output: "json",
        });
        const res = await fetch(
          `https://serpapi.com/search?${params.toString()}`,
          { signal: AbortSignal.timeout(12000) }
        );
        if (!res.ok) {
          const errBody = await res.text();
          throw new Error(`SerpAPI error ${res.status}: ${errBody}`);
        }
        return await res.json();
      }

      // Log chuỗi dài theo từng chunk 1000 ký tự để logcat không cắt
      function logFull(tag, text) {
        const chunkSize = 1000;
        for (let i = 0; i < text.length; i += chunkSize) {
          console.log(`${tag} [${Math.floor(i/chunkSize)+1}] ${text.substring(i, i + chunkSize)}`);
        }
      }

      window["ai_edge_gallery_get_result"] = async (data, secret) => {
        try {
          const jsonData = JSON.parse(data);
          if (!jsonData.query || !jsonData.query.trim()) {
            return JSON.stringify({ error: "No search query provided." });
          }

          const query = jsonData.query.trim();
          const lang = (jsonData.lang || "vi").trim();

          const serpData = await serpSearch(query, lang);

          if (serpData.error) {
            return JSON.stringify({ error: `SerpAPI: ${serpData.error}` });
          }

          // Log TOÀN BỘ ai_overview raw để debug
          const ao = serpData.ai_overview;
          console.log(`[google-search] ai_overview: ${ao ? "CÓ" : "KHÔNG CÓ"}`);
          if (ao) {
            console.log(`[google-search] ai_overview keys: ${Object.keys(ao).join(", ")}`);
            logFull("[google-search] ai_overview RAW", JSON.stringify(ao));
          }

          // Parse: gom TẤT CẢ snippet từ text_blocks
          let aiText = "";
          if (ao) {
            if (typeof ao === "string") {
              aiText = ao.trim();
            } else if (ao.text && typeof ao.text === "string") {
              aiText = ao.text.trim();
            } else if (Array.isArray(ao.text_blocks)) {
              aiText = ao.text_blocks
                .map((b) => b.snippet || b.text || "")
                .filter(Boolean)
                .join("\n")
                .trim();
              console.log(`[google-search] text_blocks count: ${ao.text_blocks.length}`);
              ao.text_blocks.forEach((b, i) => {
                console.log(`[google-search] text_blocks[${i}] type=${b.type} snippet="${b.snippet || ""}"`);
              });
            } else if (Array.isArray(ao.blocks)) {
              aiText = ao.blocks
                .map((b) => (typeof b === "string" ? b : b.snippet || b.text || ""))
                .filter(Boolean)
                .join("\n")
                .trim();
            }
          }

          if (!aiText) {
            console.log(`[google-search] ❌ Không parse được AI Overview`);
            return JSON.stringify({ result: `Không tìm thấy kết quả nào cho "${query}".` });
          }

          const output = `Kết quả tìm kiếm: "${query}"\n\n--- AI OVERVIEW ---\n${aiText}`;

          // Log TOÀN BỘ output sẽ truyền vào LLM
          console.log(`[google-search] ✅ Output ${output.length} ký tự — TOÀN BỘ NỘI DUNG TRUYỀN VÀO LLM:`);
          logFull("[google-search] OUTPUT→LLM", output);

          return JSON.stringify({ result: output });
        } catch (e) {
          console.error("[google-search] ❌ Lỗi:", e);
          return JSON.stringify({ error: `Google Search thất bại: ${e.message}` });
        }
      };
    </script>
  </body>
</html>

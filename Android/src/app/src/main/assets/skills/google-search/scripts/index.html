<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Google Search</title>
  </head>
  <body>
    <script>
      const SERPAPI_KEY = "a932ba13ac049c5536132aa9827cb2dda660691112a05b047c940a3c322d9c13";

      async function serpSearch(query, lang) {
        console.log(`[google-search] 🔍 Query: "${query}" | lang=${lang}`);
        const params = new URLSearchParams({
          q: query,
          api_key: SERPAPI_KEY,
          engine: "google",
          hl: lang,
          gl: lang === "vi" ? "vn" : "us",
          num: "5",
          output: "json",
        });
        const res = await fetch(
          `https://serpapi.com/search?${params.toString()}`,
          { signal: AbortSignal.timeout(12000) }
        );
        if (!res.ok) {
          const errBody = await res.text();
          throw new Error(`SerpAPI error ${res.status}: ${errBody.substring(0, 300)}`);
        }
        return await res.json();
      }

      window["ai_edge_gallery_get_result"] = async (data, secret) => {
        try {
          const jsonData = JSON.parse(data);
          if (!jsonData.query || !jsonData.query.trim()) {
            return JSON.stringify({ error: "No search query provided." });
          }

          const query = jsonData.query.trim();
          const lang = (jsonData.lang || "vi").trim();

          const serpData = await serpSearch(query, lang);

          if (serpData.error) {
            return JSON.stringify({ error: `SerpAPI: ${serpData.error}` });
          }

          const sections = [];

          // AI Overview
          const ao = serpData.ai_overview;
          if (ao) {
            let aiText = "";
            if (typeof ao === "string") {
              aiText = ao.trim();
            } else if (ao.text && typeof ao.text === "string") {
              aiText = ao.text.trim();
            } else if (Array.isArray(ao.blocks)) {
              aiText = ao.blocks
                .map((b) => (typeof b === "string" ? b : b.snippet || b.text || ""))
                .filter(Boolean)
                .join(" ")
                .trim();
            }
            if (aiText) {
              console.log(`[google-search] ✅ AI Overview (${aiText.length} ký tự)`);
              sections.push(`--- AI OVERVIEW ---\n${aiText}`);
            }
          }

          // Snippets từ organic results — chỉ lấy 1 cái đầu tiên
          const firstOrganic = (serpData.organic_results || []).find((r) => r.snippet);
          if (firstOrganic) {
            console.log(`[google-search] ✅ Snippet: ${firstOrganic.title}`);
            sections.push(`--- KẾT QUẢ TÌM KIẾM ---\n${firstOrganic.title}\n${firstOrganic.snippet}\nURL: ${firstOrganic.link}`);
          }

          if (sections.length === 0) {
            return JSON.stringify({ result: `Không tìm thấy kết quả nào cho "${query}".` });
          }

          const output = `Kết quả tìm kiếm: "${query}"\n\n` + sections.join("\n\n");
          console.log(`[google-search] 🏁 Output ${output.length} ký tự:\n${output}`);

          return JSON.stringify({ result: output });
        } catch (e) {
          console.error("[google-search] ❌ Lỗi:", e);
          return JSON.stringify({ error: `Google Search thất bại: ${e.message}` });
        }
      };
    </script>
  </body>
</html>

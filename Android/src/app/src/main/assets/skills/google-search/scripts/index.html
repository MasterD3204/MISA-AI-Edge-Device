<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Google Search</title>
  </head>
  <body>
    <script>
      const GOOGLE_API_KEY = "AIzaSyD5ZuvFYdZxvioaP6OKFNtdAlEgnNehOCs";
      const GOOGLE_CSE_ID = "024969196858e485f";

      const PROXY_BUILDERS = [
        (url) => `https://corsproxy.io/?url=${encodeURIComponent(url)}`,
        (url) => `https://api.allorigins.win/get?url=${encodeURIComponent(url)}`,
        (url) => `https://api.codetabs.com/v1/proxy?quest=${encodeURIComponent(url)}`,
      ];
      const PROXY_NAMES = ["corsproxy.io", "allorigins.win", "codetabs.com"];

      // ── Google Custom Search ─────────────────────────────────────────────────
      async function googleSearch(query, num, lang) {
        console.log(`[google-search] 🔍 Query: "${query}" | num=${num} | lang=${lang}`);

        const params = new URLSearchParams({
          key: GOOGLE_API_KEY,
          cx: GOOGLE_CSE_ID,
          q: query,
          num: String(Math.min(Math.max(num, 1), 10)),
        });
        if (lang && lang !== "en") {
          params.set("lr", `lang_${lang}`);
          params.set("hl", lang);
        }

        const res = await fetch(
          `https://www.googleapis.com/customsearch/v1?${params.toString()}`,
          { signal: AbortSignal.timeout(10000) }
        );
        if (!res.ok) {
          const errBody = await res.text();
          throw new Error(`Google API error ${res.status}: ${errBody.substring(0, 300)}`);
        }
        const data = await res.json();
        const totalResults = data.searchInformation?.totalResults || "0";

        if (!data.items || data.items.length === 0) {
          console.log(`[google-search] ⚠️ Không tìm thấy kết quả`);
          return { items: [], totalResults };
        }

        const items = data.items.map((item) => ({
          title: item.title || "",
          url: item.link || "",
          snippet: item.snippet ? item.snippet.replace(/\n/g, " ").trim() : "",
          date: item.pagemap?.metatags?.[0]?.["article:published_time"]
            || item.pagemap?.metatags?.[0]?.["og:updated_time"]
            || "",
        }));

        console.log(`[google-search] ✅ CSE trả về ${items.length} kết quả (tổng ~${parseInt(totalResults).toLocaleString()}):`);
        items.forEach((r, i) => {
          console.log(`  [${i + 1}] ${r.title}`);
          console.log(`       URL: ${r.url}`);
          if (r.snippet) console.log(`       Snippet: ${r.snippet.substring(0, 120)}...`);
        });

        return { items, totalResults };
      }

      // ── Fetch page content qua proxy với fallback ────────────────────────────
      async function fetchPageContent(url, maxChars, sourceIndex) {
        const label = `[Nguồn ${sourceIndex}]`;

        for (let pi = 0; pi < PROXY_BUILDERS.length; pi++) {
          const proxyName = PROXY_NAMES[pi];
          const proxyUrl = PROXY_BUILDERS[pi](url);
          console.log(`[google-search] ${label} Đang fetch qua proxy ${pi + 1}/${PROXY_BUILDERS.length} (${proxyName}): ${url}`);

          try {
            const t0 = Date.now();
            const res = await fetch(proxyUrl, { signal: AbortSignal.timeout(7000) });
            const elapsed = Date.now() - t0;

            if (!res.ok) {
              console.log(`[google-search] ${label} Proxy ${proxyName} HTTP ${res.status} (${elapsed}ms) — thử proxy tiếp`);
              continue;
            }

            let html = "";
            const contentType = res.headers.get("content-type") || "";
            if (contentType.includes("application/json")) {
              const json = await res.json();
              html = json.contents || json.data || "";
            } else {
              html = await res.text();
            }

            if (!html) {
              console.log(`[google-search] ${label} Proxy ${proxyName} trả về nội dung rỗng (${elapsed}ms) — thử proxy tiếp`);
              continue;
            }

            const rawText = extractText(html, maxChars);
            const text = formatTextForLLM(rawText);
            if (text && text.length > 150) {
              console.log(`[google-search] ${label} ✅ Proxy ${proxyName} thành công (${elapsed}ms) — ${text.length} ký tự`);
              console.log(`[google-search] ${label} ====== TOÀN BỘ NỘI DUNG TRANG ======\n${text}\n====== HẾT NỘI DUNG [Nguồn ${sourceIndex}] ======`);
              return text;
            } else {
              console.log(`[google-search] ${label} Proxy ${proxyName} nội dung quá ngắn (${text?.length ?? 0} ký tự) — thử proxy tiếp`);
            }
          } catch (e) {
            console.log(`[google-search] ${label} Proxy ${proxyName} lỗi: ${e.message} — thử proxy tiếp`);
          }
        }

        console.log(`[google-search] ${label} ❌ Tất cả proxy thất bại — dùng snippet`);
        return null;
      }

      // ── Format text cho LLM dễ đọc ──────────────────────────────────────────
      function formatTextForLLM(rawText) {
        if (!rawText) return null;

        let text = rawText;

        // 1. Chuẩn hóa xuống dòng
        text = text.replace(/\r\n/g, "\n").replace(/\r/g, "\n");

        // 2. Bỏ các dòng chỉ có ký tự đặc biệt / separator vô nghĩa
        text = text
          .split("\n")
          .filter((line) => {
            const t = line.trim();
            if (t.length === 0) return false;
            if (/^[-=_*|#]{3,}$/.test(t)) return false; // dòng chỉ có dashes/equals
            if (/^[•·▪▸►→\-]\s*$/.test(t)) return false; // bullet trống
            if (t.length < 3) return false; // quá ngắn
            return true;
          })
          .join("\n");

        // 3. Gộp nhiều dòng trắng liên tiếp thành 1
        text = text.replace(/\n{3,}/g, "\n\n");

        // 4. Loại bỏ ký tự rác từ web scraping
        text = text
          .replace(/\[object Object\]/g, "")
          .replace(/undefined/g, "")
          .replace(/\t/g, " ")
          .replace(/[ ]{3,}/g, "  ");

        // 5. Tách thành đoạn — dòng ngắn < 60 ký tự là heading, dòng dài gộp thành paragraph
        const lines = text.split("\n");
        const paragraphs = [];
        let buffer = "";

        for (const line of lines) {
          const t = line.trim();
          if (t.length === 0) {
            if (buffer) { paragraphs.push(buffer.trim()); buffer = ""; }
            continue;
          }
          if (t.length < 60 && !buffer) {
            paragraphs.push(t);
          } else if (t.length < 60 && buffer) {
            paragraphs.push(buffer.trim());
            buffer = "";
            paragraphs.push(t);
          } else {
            buffer += (buffer ? " " : "") + t;
          }
        }
        if (buffer) paragraphs.push(buffer.trim());

        // 6. Dedup — bỏ đoạn trùng lặp (so sánh 80 ký tự đầu)
        const seen = new Set();
        const deduped = paragraphs.filter((p) => {
          const key = p.substring(0, 80);
          if (seen.has(key)) return false;
          seen.add(key);
          return true;
        });

        return deduped.join("\n\n").trim();
      }

      // ── Extract text từ HTML ─────────────────────────────────────────────────
      function extractText(html, maxChars) {
        try {
          const parser = new DOMParser();
          const doc = parser.parseFromString(html, "text/html");

          const REMOVE = [
            "script", "style", "nav", "header", "footer", "aside",
            "iframe", "noscript", ".ads", "#ads", ".cookie", ".popup",
            ".banner", ".sidebar", ".menu", ".navigation", ".social",
            ".share", "[role='navigation']", "[role='banner']",
          ];
          REMOVE.forEach((sel) => {
            try { doc.querySelectorAll(sel).forEach((el) => el.remove()); } catch (_) {}
          });

          const MAIN_SELECTORS = [
            "article", "main", "[role='main']",
            ".content", "#content", ".post", ".article", ".entry",
            ".post-content", ".article-body", ".story-body",
          ];
          let text = "";
          for (const sel of MAIN_SELECTORS) {
            try {
              const el = doc.querySelector(sel);
              if (el) {
                text = (el.innerText || el.textContent || "").trim();
                if (text.length > 300) break;
              }
            } catch (_) {}
          }

          if (text.length < 300) {
            text = (doc.body?.innerText || doc.body?.textContent || "").trim();
          }

          text = text
            .replace(/\t/g, " ")
            .replace(/[ ]{2,}/g, " ")
            .replace(/\n{3,}/g, "\n\n")
            .trim();

          if (text.length > maxChars) {
            text = text.substring(0, maxChars) + "... [TRUNCATED]";
          }

          return text.length > 150 ? text : null;
        } catch (_) {
          return null;
        }
      }

      // ── Main entry point ─────────────────────────────────────────────────────
      window["ai_edge_gallery_get_result"] = async (data, secret) => {
        try {
          const jsonData = JSON.parse(data);
          if (!jsonData.query || jsonData.query.trim() === "") {
            return JSON.stringify({ error: "No search query provided." });
          }

          const query = jsonData.query.trim();
          const num = 2;
          const lang = jsonData.lang || "vi";
          const maxCharsPerPage = 4000;

          const t0 = Date.now();

          // Step 1: Google CSE search
          const { items: searchResults, totalResults } = await googleSearch(query, num, lang);

          if (searchResults.length === 0) {
            return JSON.stringify({
              result: `Không tìm thấy kết quả nào cho "${query}". Hãy thử truy vấn khác.`,
            });
          }

          // Step 2: Fetch toàn bộ nội dung 2 trang song song
          console.log(`[google-search] 📄 Bắt đầu fetch nội dung ${searchResults.length} trang song song...`);
          const contentPromises = searchResults.map((r, i) =>
            fetchPageContent(r.url, maxCharsPerPage, i + 1)
          );
          const pageContents = await Promise.all(contentPromises);

          const fetchedCount = pageContents.filter(Boolean).length;
          console.log(`[google-search] 📊 Tổng kết: ${fetchedCount}/${searchResults.length} trang fetch thành công | Thời gian: ${Date.now() - t0}ms`);

          // Step 3: Build output
          let output = `Kết quả tìm kiếm web cho: "${query}"\n`;
          output += `Tìm thấy khoảng ${parseInt(totalResults).toLocaleString()} kết quả. Nội dung ${searchResults.length} trang đầu:\n\n`;
          output += "=".repeat(60) + "\n\n";

          for (let i = 0; i < searchResults.length; i++) {
            const r = searchResults[i];
            const content = pageContents[i];
            output += `[Nguồn ${i + 1}] ${r.title}\n`;
            output += `URL: ${r.url}\n`;
            if (r.date) output += `Ngày: ${r.date}\n`;
            if (content) {
              output += `\nNỘI DUNG:\n${content}\n`;
            } else {
              output += `\nTÓM TẮT (không thể tải trang): ${r.snippet}\n`;
            }
            output += "\n" + "-".repeat(60) + "\n\n";
          }

          const TOTAL_MAX = 12000;
          if (output.length > TOTAL_MAX) {
            output = output.substring(0, TOTAL_MAX) + "\n\n... [ĐÃ GIỚI HẠN — đạt giới hạn ngữ cảnh]";
          }

          console.log(`[google-search] 🏁 Hoàn tất — output ${output.length} ký tự gửi cho LLM`);
          console.log(`[google-search] ====== TOÀN BỘ OUTPUT GỬI CHO LLM ======\n${output}\n====== HẾT OUTPUT ======`);

          return JSON.stringify({ result: output });
        } catch (e) {
          console.error("[google-search] ❌ Lỗi nghiêm trọng:", e);
          return JSON.stringify({ error: `Google Search thất bại: ${e.message}` });
        }
      };
    </script>
  </body>
</html>

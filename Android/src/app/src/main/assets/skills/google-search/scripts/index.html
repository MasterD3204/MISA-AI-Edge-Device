<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Google Search</title>
  </head>
  <body>
    <script>
      /**
       * Performs a Google Custom Search using the provided API key and Search Engine ID.
       * @param {string} query - The search query.
       * @param {number} num - Number of results (1–10).
       * @param {string} lang - Language code for results.
       * @param {string} apiKey - Google Custom Search API key.
       * @param {string} cx - Custom Search Engine ID.
       */
      async function googleSearch(query, num, lang, apiKey, cx) {
        const params = new URLSearchParams({
          key: apiKey,
          cx: cx,
          q: query,
          num: String(Math.min(Math.max(num, 1), 10)),
        });
        if (lang && lang !== "en") {
          params.set("lr", `lang_${lang}`);
          params.set("hl", lang);
        }

        const url = `https://www.googleapis.com/customsearch/v1?${params.toString()}`;
        const res = await fetch(url);
        if (!res.ok) {
          const errBody = await res.text();
          throw new Error(`Google API error ${res.status}: ${errBody}`);
        }
        const data = await res.json();

        if (!data.items || data.items.length === 0) {
          return { results: [], totalResults: "0", query: query };
        }

        const results = data.items.map((item, idx) => ({
          index: idx + 1,
          title: item.title || "",
          url: item.link || "",
          snippet: item.snippet ? item.snippet.replace(/\n/g, " ").trim() : "",
          displayLink: item.displayLink || "",
        }));

        const totalResults = data.searchInformation?.totalResults || "0";
        return { results, totalResults, query };
      }

      const GOOGLE_API_KEY = "AIzaSyD5ZuvFYdZxvioaP6OKFNtdAlEgnNehOCs";
      const GOOGLE_CSE_ID = "024969196858e485f";

      window["ai_edge_gallery_get_result"] = async (data, secret) => {
        try {
          // Parse input data
          const jsonData = JSON.parse(data);
          if (!jsonData.query || jsonData.query.trim() === "") {
            return JSON.stringify({ error: "No search query provided." });
          }

          const query = jsonData.query.trim();
          const num = jsonData.num ? parseInt(jsonData.num, 10) : 5;
          const lang = jsonData.lang || "en";

          const apiKey = GOOGLE_API_KEY;
          const cx = GOOGLE_CSE_ID;

          const searchResult = await googleSearch(query, num, lang, apiKey, cx);

          if (searchResult.results.length === 0) {
            return JSON.stringify({
              result: `No results found for "${query}". Try a different query.`,
            });
          }

          // Format output compactly to save context window
          let output = `Google Search: "${query}" — ${searchResult.totalResults} total results\n\n`;
          for (const r of searchResult.results) {
            output += `${r.index}. ${r.title}\n`;
            output += `   ${r.url}\n`;
            if (r.snippet) output += `   ${r.snippet}\n`;
            output += "\n";
          }

          // Truncate if too long
          const MAX_CHARS = 4000;
          if (output.length > MAX_CHARS) {
            output = output.substring(0, MAX_CHARS) + "\n... [TRUNCATED]";
          }

          // Return "result" field so CallJsSkillResult parses correctly
          return JSON.stringify({ result: output });
        } catch (e) {
          console.error("Google Search error:", e);
          return JSON.stringify({ error: `Google Search failed: ${e.message}` });
        }
      };
    </script>
  </body>
</html>

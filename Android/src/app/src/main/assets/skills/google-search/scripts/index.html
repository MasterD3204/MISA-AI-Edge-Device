<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Google Search</title>
  </head>
  <body>
    <script>
      const SERPAPI_KEY = "a932ba13ac049c5536132aa9827cb2dda660691112a05b047c940a3c322d9c13";

      async function serpSearch(query, lang) {
        console.log(`[google-search] 🔍 Query: "${query}" | lang=${lang}`);
        const params = new URLSearchParams({
          q: query,
          api_key: SERPAPI_KEY,
          engine: "google",
          hl: lang,
          gl: lang === "vi" ? "vn" : "us",
          num: "5",
          output: "json",
        });
        const res = await fetch(
          `https://serpapi.com/search?${params.toString()}`,
          { signal: AbortSignal.timeout(12000) }
        );
        if (!res.ok) {
          const errBody = await res.text();
          throw new Error(`SerpAPI error ${res.status}: ${errBody.substring(0, 300)}`);
        }
        return await res.json();
      }

      window["ai_edge_gallery_get_result"] = async (data, secret) => {
        try {
          const jsonData = JSON.parse(data);
          if (!jsonData.query || !jsonData.query.trim()) {
            return JSON.stringify({ error: "No search query provided." });
          }

          const query = jsonData.query.trim();
          const lang = (jsonData.lang || "vi").trim();

          const serpData = await serpSearch(query, lang);

          if (serpData.error) {
            return JSON.stringify({ error: `SerpAPI: ${serpData.error}` });
          }

          const sections = [];

          // AI Overview
          const ao = serpData.ai_overview;
          console.log(`[google-search] ai_overview field: ${ao ? `CÓ (type=${typeof ao}, keys=${typeof ao === "object" ? Object.keys(ao).join(",") : "n/a"})` : "KHÔNG CÓ"}`);
          if (ao) {
            console.log(`[google-search] ai_overview raw (500 ký tự đầu): ${JSON.stringify(ao).substring(0, 500)}`);
            let aiText = "";
            if (typeof ao === "string") {
              aiText = ao.trim();
              console.log(`[google-search] ai_overview parse: dạng string`);
            } else if (ao.text && typeof ao.text === "string") {
              aiText = ao.text.trim();
              console.log(`[google-search] ai_overview parse: dạng object.text`);
            } else if (Array.isArray(ao.text_blocks)) {
              aiText = ao.text_blocks
                .map((b) => b.snippet || b.text || "")
                .filter(Boolean)
                .join(" ")
                .trim();
              console.log(`[google-search] ai_overview parse: dạng text_blocks (${ao.text_blocks.length} blocks)`);
            } else if (Array.isArray(ao.blocks)) {
              aiText = ao.blocks
                .map((b) => (typeof b === "string" ? b : b.snippet || b.text || ""))
                .filter(Boolean)
                .join(" ")
                .trim();
              console.log(`[google-search] ai_overview parse: dạng blocks (${ao.blocks.length} blocks)`);
            } else {
              console.log(`[google-search] ⚠️ ai_overview có nhưng không parse được — không khớp format nào`);
            }
            if (aiText) {
              console.log(`[google-search] ✅ AI Overview đã parse (${aiText.length} ký tự) → SẼ truyền vào LLM`);
              sections.push(`--- AI OVERVIEW ---\n${aiText}`);
            } else {
              console.log(`[google-search] ❌ AI Overview parse ra rỗng → KHÔNG truyền vào LLM`);
            }
          } else {
            console.log(`[google-search] ❌ Không có AI Overview → KHÔNG truyền vào LLM`);
          }

          if (sections.length === 0) {
            return JSON.stringify({ result: `Không tìm thấy kết quả nào cho "${query}".` });
          }

          const output = `Kết quả tìm kiếm: "${query}"\n\n` + sections.join("\n\n");
          console.log(`[google-search] 🏁 Output ${output.length} ký tự:\n${output}`);

          return JSON.stringify({ result: output });
        } catch (e) {
          console.error("[google-search] ❌ Lỗi:", e);
          return JSON.stringify({ error: `Google Search thất bại: ${e.message}` });
        }
      };
    </script>
  </body>
</html>

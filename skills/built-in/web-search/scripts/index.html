<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Web Search</title>
  </head>
  <body>
    <script>
      /**
       * Performs a web search via SerpAPI and returns:
       *  - AI Overview (Google's AI-generated summary) if present
       *  - Top organic search results
       *
       * @param {string} query  - Search query
       * @param {string} lang   - Language code for results (e.g. "vi", "en")
       * @param {number} num    - Number of organic results to return (1-5)
       * @param {string} apiKey - SerpAPI key
       */
      async function performWebSearch(query, lang, num, apiKey) {
        const params = new URLSearchParams({
          q: query,
          api_key: apiKey,
          engine: "google",
          hl: lang,         // UI language
          gl: lang === "vi" ? "vn" : "us",  // Country for results
          num: String(Math.min(Math.max(num, 1), 5)),
          output: "json",
          no_cache: "false",
        });

        const url = `https://serpapi.com/search?${params.toString()}`;
        const response = await fetch(url);
        if (!response.ok) {
          const errText = await response.text();
          throw new Error(`SerpAPI error ${response.status}: ${errText.substring(0, 200)}`);
        }
        return await response.json();
      }

      /**
       * Extracts and formats the AI Overview block from SerpAPI response.
       * The field is called "ai_overview" in SerpAPI v2+.
       */
      function extractAiOverview(data) {
        // SerpAPI returns ai_overview as an object with a "text" field (or array of blocks)
        const ao = data.ai_overview;
        if (!ao) return null;

        let text = "";

        // Format 1: plain text string
        if (typeof ao === "string" && ao.trim()) {
          text = ao.trim();
        }
        // Format 2: object with "text" field
        else if (ao.text && typeof ao.text === "string") {
          text = ao.text.trim();
        }
        // Format 3: object with "blocks" array (newer SerpAPI format)
        else if (Array.isArray(ao.blocks)) {
          text = ao.blocks
            .map((b) => {
              if (typeof b === "string") return b;
              if (b.snippet) return b.snippet;
              if (b.title && b.snippet) return `**${b.title}**: ${b.snippet}`;
              return "";
            })
            .filter(Boolean)
            .join(" ");
        }
        // Format 4: object with "answer_box" fallback
        else if (data.answer_box) {
          const ab = data.answer_box;
          text = ab.answer || ab.snippet || ab.result || "";
        }

        if (!text) return null;

        // Trim to 1500 chars to save context window
        if (text.length > 1500) {
          text = text.substring(0, 1500) + "... [truncated]";
        }
        return text;
      }

      /**
       * Extracts organic results from SerpAPI response.
       */
      function extractOrganicResults(data, num) {
        const results = data.organic_results;
        if (!results || !Array.isArray(results)) return [];

        return results.slice(0, num).map((r) => ({
          title: r.title || "",
          link: r.link || "",
          snippet: r.snippet || r.rich_snippet?.top?.detected_extensions?.description || "",
          date: r.date || "",
        }));
      }

      /**
       * Extracts knowledge graph info if present (e.g., entity cards).
       */
      function extractKnowledgeGraph(data) {
        const kg = data.knowledge_graph;
        if (!kg) return null;
        const parts = [];
        if (kg.title) parts.push(`**${kg.title}**`);
        if (kg.type) parts.push(kg.type);
        if (kg.description) parts.push(kg.description);
        if (kg.source?.link) parts.push(`Source: ${kg.source.link}`);
        return parts.length > 1 ? parts.join(" — ") : null;
      }

      /**
       * Main entry point exposed to the AI Edge Gallery app.
       */
      window["ai_edge_gallery_get_result"] = async (data, secret) => {
        try {
          const jsonData = JSON.parse(data);

          if (!jsonData.query || !jsonData.query.trim()) {
            return JSON.stringify({ error: "No search query provided." });
          }
          if (!secret || !secret.trim()) {
            return JSON.stringify({
              error: "SerpAPI key is required. Get a free key at https://serpapi.com/users/sign_up",
            });
          }

          const query = jsonData.query.trim();
          const lang = (jsonData.lang || "vi").trim();
          const num = parseInt(jsonData.num) || 3;

          const searchData = await performWebSearch(query, lang, num, secret.trim());

          // Check for API-level error
          if (searchData.error) {
            return JSON.stringify({ error: `SerpAPI: ${searchData.error}` });
          }

          // Build structured result
          const sections = [];

          // 1. AI Overview (highest priority)
          const aiOverview = extractAiOverview(searchData);
          if (aiOverview) {
            sections.push(`--- AI OVERVIEW ---\n${aiOverview}`);
          }

          // 2. Knowledge Graph card
          const kg = extractKnowledgeGraph(searchData);
          if (kg) {
            sections.push(`--- KNOWLEDGE CARD ---\n${kg}`);
          }

          // 3. Organic results
          const organicResults = extractOrganicResults(searchData, num);
          if (organicResults.length > 0) {
            const lines = organicResults.map((r, i) => {
              let line = `[${i + 1}] ${r.title}`;
              if (r.date) line += ` (${r.date})`;
              line += `\n    URL: ${r.link}`;
              if (r.snippet) line += `\n    ${r.snippet}`;
              return line;
            });
            sections.push(`--- TOP RESULTS ---\n${lines.join("\n\n")}`);
          }

          if (sections.length === 0) {
            return JSON.stringify({
              error: `No results found for query: "${query}"`,
            });
          }

          // Apply total character cap (5000 chars)
          let finalResult = sections.join("\n\n");
          if (finalResult.length > 5000) {
            finalResult = finalResult.substring(0, 5000) + "\n\n... [TRUNCATED TO SAVE CONTEXT]";
          }

          return JSON.stringify({
            result: finalResult,
          });
        } catch (e) {
          console.error("web-search error:", e);
          return JSON.stringify({
            error: `Web search failed: ${e.message}`,
          });
        }
      };
    </script>
  </body>
</html>
